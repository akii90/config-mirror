---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: config-mirror
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: config-mirror
rules:
  # Manage source and mirrored Secrets across all namespaces.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Manage source and mirrored ConfigMaps across all namespaces.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Read namespaces to compute sync targets and detect new namespaces.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]


---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: config-mirror
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: config-mirror
subjects:
  - kind: ServiceAccount
    name: config-mirror
    namespace: default
